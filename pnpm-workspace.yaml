blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@typescript/*"
autoInstallPeers: false
verifyDepsBeforeRun: error

packages:
  - "apps/*"
  - "packages/*"
  - "templates/*"

allowBuilds:
  dprint: true
  "esbuild": true
  "rolldown": true
  "sharp": true
  simple-git-hooks: false
  "unrs-resolver": true
  "workerd": true
