name: Renovate

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  discoverUpgrades:
    name: Discover Upgrades
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PK_XLXL198M }}
          owner: jeremybanka
          repositories: atom.io
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-statuses: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        env:
          LOG_LEVEL: debug
          RENOVATE_ALLOW_PLUGINS: true
          RENOVATE_REPOSITORIES: jeremybanka/atom.io
        with:
          configurationFile: renovate.json
          token: ${{ steps.app-token.outputs.token }}
