name: Release

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Release:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CHANGESETS_APP_CLIENT_ID }}
          private-key: ${{ secrets.CHANGESETS_APP_PK_2OJEM1SH }}
          owner: jeremybanka
          repositories: atom.io
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: ./.github/actions/setup
        with:
          packages: bun node pnpm
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        id: changesets
        with:
          # This expects you to have a script called changes:publish which does a build for your packages and calls changeset publish
          publish: bun run changes:publish
          version: bun run changes:version
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
